services:
  postgres:
    image: postgres:17
    container_name: ses-postgres
    environment:
      POSTGRES_DB: ses
      POSTGRES_USER: ses
      POSTGRES_PASSWORD: ses
    ports:
      - "5434:5432"
    volumes:
      - ses_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ses -d ses"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ses_postgres_data:
