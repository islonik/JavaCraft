<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1150" viewBox="0 0 1400 1150" role="img" aria-labelledby="title desc">
  <title id="title">Cyclic sort step-by-step illustration</title>
  <desc id="desc">A step-by-step diagram showing cyclic sort on the array [3, 1, 5, 4, 2] by swapping each value into its correct index.</desc>

  <defs>
    <style>
      .bg { fill: #edf5fb; }
      .card { fill: #f8fbff; stroke: #c8d9eb; stroke-width: 2; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #49647d; }
      .section { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .body { font: 500 17px "Segoe UI", Arial, sans-serif; fill: #36516d; }
      .small { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #4c6780; }
      .mono { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #17324b; }
      .index-text { font: 600 14px "SFMono-Regular", Consolas, monospace; fill: #48647d; }
      .array-box { fill: #ffffff; stroke: #9db6d0; stroke-width: 2; rx: 14; ry: 14; }
      .active-box { fill: #fff0e6; stroke: #d77d3d; stroke-width: 3; rx: 14; ry: 14; }
      .target-box { fill: #e6f6ec; stroke: #3f9468; stroke-width: 3; rx: 14; ry: 14; }
      .fixed-box { fill: #e9f1ff; stroke: #5f86c9; stroke-width: 2.5; rx: 14; ry: 14; }
      .value { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .note { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .swap { stroke: #6c82a0; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .result-card { fill: #17324b; rx: 20; ry: 20; }
      .result-title { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .result-body { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #d8e6f5; }
    </style>

    <marker id="arrow" viewBox="0 0 12 12" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#6c82a0"/>
    </marker>
  </defs>

  <rect width="1400" height="1150" class="bg"/>
  <rect x="32" y="28" width="1336" height="1094" class="card" rx="28" ry="28"/>

  <text x="60" y="84" class="title">Cyclic Sort: Put Each Value in Its Correct Index</text>
  <text x="60" y="118" class="subtitle">For values in the range 1..n, value v belongs at index v - 1. If nums[i] is not in its place, swap it there.</text>

  <rect x="70" y="150" width="1260" height="92" class="card" rx="22" ry="22"/>
  <text x="100" y="188" class="section">Rule</text>
  <text x="100" y="220" class="body">While <tspan class="mono">nums[i] != nums[nums[i] - 1]</tspan>, swap <tspan class="mono">nums[i]</tspan> with the value at its correct index.</text>

  <rect x="70" y="270" width="1260" height="740" class="card" rx="26" ry="26"/>
  <text x="100" y="315" class="section">Example: nums = [3, 1, 5, 4, 2]</text>

  <!-- Step 0 -->
  <text x="100" y="365" class="note">Step 0: start at i = 0</text>
  <text x="100" y="392" class="small">nums[0] = 3, so correctIndex = 2</text>
  <text x="100" y="420" class="small">Swap the value at index 0 with the value at index 2.</text>
  <text x="250" y="448" class="index-text">index</text>
  <text x="352" y="448" class="index-text">0</text>
  <text x="462" y="448" class="index-text">1</text>
  <text x="572" y="448" class="index-text">2</text>
  <text x="682" y="448" class="index-text">3</text>
  <text x="792" y="448" class="index-text">4</text>
  <rect x="320" y="465" width="80" height="64" class="active-box"/>
  <rect x="430" y="465" width="80" height="64" class="array-box"/>
  <rect x="540" y="465" width="80" height="64" class="target-box"/>
  <rect x="650" y="465" width="80" height="64" class="array-box"/>
  <rect x="760" y="465" width="80" height="64" class="array-box"/>
  <text x="360" y="505" text-anchor="middle" class="value">3</text>
  <text x="470" y="505" text-anchor="middle" class="value">1</text>
  <text x="580" y="505" text-anchor="middle" class="value">5</text>
  <text x="690" y="505" text-anchor="middle" class="value">4</text>
  <text x="800" y="505" text-anchor="middle" class="value">2</text>
  <path d="M395 498 C445 445, 505 445, 545 498" class="swap"/>
  <path d="M545 514 C505 567, 445 567, 395 514" class="swap"/>
  <text x="900" y="505" class="mono">[5, 1, 3, 4, 2]</text>

  <!-- Step 1 -->
  <text x="100" y="595" class="note">Step 1: stay at i = 0</text>
  <text x="100" y="622" class="small">nums[0] = 5, so correctIndex = 4</text>
  <text x="100" y="650" class="small">Swap the value at index 0 with the value at index 4.</text>
  <text x="250" y="678" class="index-text">index</text>
  <text x="352" y="678" class="index-text">0</text>
  <text x="462" y="678" class="index-text">1</text>
  <text x="572" y="678" class="index-text">2</text>
  <text x="682" y="678" class="index-text">3</text>
  <text x="792" y="678" class="index-text">4</text>
  <rect x="320" y="695" width="80" height="64" class="active-box"/>
  <rect x="430" y="695" width="80" height="64" class="array-box"/>
  <rect x="540" y="695" width="80" height="64" class="fixed-box"/>
  <rect x="650" y="695" width="80" height="64" class="array-box"/>
  <rect x="760" y="695" width="80" height="64" class="target-box"/>
  <text x="360" y="735" text-anchor="middle" class="value">5</text>
  <text x="470" y="735" text-anchor="middle" class="value">1</text>
  <text x="580" y="735" text-anchor="middle" class="value">3</text>
  <text x="690" y="735" text-anchor="middle" class="value">4</text>
  <text x="800" y="735" text-anchor="middle" class="value">2</text>
  <path d="M395 728 C505 645, 655 645, 765 728" class="swap"/>
  <path d="M765 744 C655 827, 505 827, 395 744" class="swap"/>
  <text x="900" y="735" class="mono">[2, 1, 3, 4, 5]</text>

  <!-- Step 2 -->
  <text x="100" y="825" class="note">Step 2: still i = 0</text>
  <text x="100" y="852" class="small">nums[0] = 2, so correctIndex = 1</text>
  <text x="100" y="880" class="small">Swap the value at index 0 with the value at index 1.</text>
  <text x="250" y="908" class="index-text">index</text>
  <text x="352" y="908" class="index-text">0</text>
  <text x="462" y="908" class="index-text">1</text>
  <text x="572" y="908" class="index-text">2</text>
  <text x="682" y="908" class="index-text">3</text>
  <text x="792" y="908" class="index-text">4</text>
  <rect x="320" y="925" width="80" height="64" class="active-box"/>
  <rect x="430" y="925" width="80" height="64" class="target-box"/>
  <rect x="540" y="925" width="80" height="64" class="fixed-box"/>
  <rect x="650" y="925" width="80" height="64" class="fixed-box"/>
  <rect x="760" y="925" width="80" height="64" class="fixed-box"/>
  <text x="360" y="965" text-anchor="middle" class="value">2</text>
  <text x="470" y="965" text-anchor="middle" class="value">1</text>
  <text x="580" y="965" text-anchor="middle" class="value">3</text>
  <text x="690" y="965" text-anchor="middle" class="value">4</text>
  <text x="800" y="965" text-anchor="middle" class="value">5</text>
  <path d="M395 958 C420 930, 445 930, 435 958" class="swap"/>
  <path d="M435 972 C425 1000, 400 1000, 395 972" class="swap"/>
  <text x="900" y="965" class="mono">[1, 2, 3, 4, 5]</text>

  <rect x="70" y="1035" width="1260" height="70" class="result-card"/>
  <text x="100" y="1078" class="result-title">Each swap places at least one number into its final position, so the total work stays O(n).</text>
</svg>
