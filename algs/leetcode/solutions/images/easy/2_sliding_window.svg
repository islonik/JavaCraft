<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Sliding window illustration</title>
  <desc id="desc">A step-by-step diagram showing a fixed-size sliding window on the array [2, 1, 5, 1, 3, 2], updating the running sum by subtracting the outgoing element and adding the incoming element.</desc>

  <defs>
    <style>
      .bg { fill: #edf5fb; }
      .card { fill: #f8fbff; stroke: #c8d9eb; stroke-width: 2; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #49647d; }
      .section { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .body { font: 500 17px "Segoe UI", Arial, sans-serif; fill: #34506a; }
      .small { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #4c6780; }
      .mono { font: 700 17px "SFMono-Regular", Consolas, monospace; fill: #17324b; }
      .pipe { fill: #ffffff; stroke: #d4e1ef; stroke-width: 2; rx: 18; ry: 18; }
      .chip { rx: 18; ry: 18; }
      .legend { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #17324b; }

      .panel { fill: #ffffff; stroke: #c8d9eb; stroke-width: 2; rx: 22; ry: 22; }
      .panel-best { fill: #f7fbff; stroke: #2d8a4e; stroke-width: 3; rx: 22; ry: 22; }
      .panel-title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .panel-body { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #43617b; }
      .formula { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #17324b; }
      .index-text { font: 600 12px "SFMono-Regular", Consolas, monospace; fill: #5a738c; text-anchor: middle; }
      .box { fill: #ffffff; stroke: #9db6d0; stroke-width: 2; rx: 10; ry: 10; }
      .window-box { fill: #ffffff; stroke: #9db6d0; stroke-width: 2; rx: 10; ry: 10; }
      .out-box { fill: #fff0e6; stroke: #d77d3d; stroke-width: 2.5; rx: 10; ry: 10; }
      .in-box { fill: #e6f6ec; stroke: #3f9468; stroke-width: 2.5; rx: 10; ry: 10; }
      .window-frame { fill: none; stroke: #111111; stroke-width: 3; rx: 12; ry: 12; }
      .value { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .best-text { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #2d8a4e; }

      .result-card { fill: #17324b; rx: 20; ry: 20; }
      .result-title { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .result-body { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #d8e6f5; }
    </style>
  </defs>

  <rect width="1400" height="980" class="bg"/>
  <rect x="32" y="28" width="1336" height="924" class="card" rx="28" ry="28"/>

  <text x="60" y="84" class="title">Sliding Window</text>
  <text x="60" y="118" class="subtitle">For a fixed-size window, do not recalculate every group from scratch. Slide right by 1 and update the running sum in O(1).</text>

  <rect x="70" y="150" width="1260" height="112" class="pipe"/>
  <text x="100" y="188" class="section">Rule</text>
  <text x="100" y="220" class="body">Start with the first window sum. Each time the window moves right, subtract the outgoing value and add the incoming value.</text>
  <text x="100" y="245" class="mono">newSum = oldSum - nums[left] + nums[right + 1]</text>

  <rect x="90" y="290" width="1220" height="510" class="card" rx="24" ry="24"/>
  <text x="125" y="334" class="section">Example: nums = [2, 1, 5, 1, 3, 2], k = 3</text>

  <rect x="125" y="360" width="170" height="42" class="chip" fill="#ffffff" stroke="#111111" stroke-width="2.5"/>
  <text x="150" y="387" class="legend">active window</text>
  <rect x="315" y="360" width="165" height="42" class="chip" fill="#fff0e6" stroke="#d77d3d" stroke-width="2.5"/>
  <text x="340" y="387" class="legend">outgoing</text>
  <rect x="500" y="360" width="165" height="42" class="chip" fill="#e6f6ec" stroke="#3f9468" stroke-width="2.5"/>
  <text x="525" y="387" class="legend">incoming</text>
  <rect x="685" y="360" width="170" height="42" class="chip" fill="#f7fbff" stroke="#2d8a4e" stroke-width="2.5"/>
  <text x="710" y="387" class="legend">best so far</text>

  <rect x="110" y="425" width="280" height="315" class="panel"/>
  <text x="135" y="460" class="panel-title">Window 0..2</text>
  <text x="135" y="485" class="panel-body">Take the first k elements.</text>
  <text x="135" y="515" class="formula">sum = 2 + 1 + 5 = 8</text>
  <text x="250" y="542" text-anchor="middle" class="best-text">best = 8</text>
  <text x="136" y="575" text-anchor="middle" class="index-text">idx</text>
  <text x="174" y="575" class="index-text">0</text>
  <text x="212" y="575" class="index-text">1</text>
  <text x="250" y="575" class="index-text">2</text>
  <text x="288" y="575" class="index-text">3</text>
  <text x="326" y="575" class="index-text">4</text>
  <text x="364" y="575" class="index-text">5</text>
  <rect x="155" y="558" width="114" height="86" class="window-frame"/>
  <rect x="158" y="590" width="32" height="44" class="window-box"/>
  <rect x="196" y="590" width="32" height="44" class="window-box"/>
  <rect x="234" y="590" width="32" height="44" class="window-box"/>
  <rect x="272" y="590" width="32" height="44" class="box"/>
  <rect x="310" y="590" width="32" height="44" class="box"/>
  <rect x="348" y="590" width="32" height="44" class="box"/>
  <text x="174" y="619" text-anchor="middle" class="value">2</text>
  <text x="212" y="619" text-anchor="middle" class="value">1</text>
  <text x="250" y="619" text-anchor="middle" class="value">5</text>
  <text x="288" y="619" text-anchor="middle" class="value">1</text>
  <text x="326" y="619" text-anchor="middle" class="value">3</text>
  <text x="364" y="619" text-anchor="middle" class="value">2</text>
  <text x="250" y="675" text-anchor="middle" class="small">Window = [2, 1, 5]</text>
  <text x="250" y="700" text-anchor="middle" class="small">Next slide: remove 2, add 1</text>

  <rect x="410" y="425" width="280" height="315" class="panel"/>
  <text x="435" y="460" class="panel-title">Window 1..3</text>
  <text x="435" y="485" class="panel-body">Slide right by one position.</text>
  <text x="435" y="515" class="formula">sum = 8 - 2 + 1 = 7</text>
  <text x="550" y="542" text-anchor="middle" class="panel-body">best stays 8</text>
  <text x="436" y="575" text-anchor="middle" class="index-text">idx</text>
  <text x="474" y="575" class="index-text">0</text>
  <text x="512" y="575" class="index-text">1</text>
  <text x="550" y="575" class="index-text">2</text>
  <text x="588" y="575" class="index-text">3</text>
  <text x="626" y="575" class="index-text">4</text>
  <text x="664" y="575" class="index-text">5</text>
  <rect x="493" y="558" width="114" height="86" class="window-frame"/>
  <rect x="458" y="590" width="32" height="44" class="out-box"/>
  <rect x="496" y="590" width="32" height="44" class="window-box"/>
  <rect x="534" y="590" width="32" height="44" class="window-box"/>
  <rect x="572" y="590" width="32" height="44" class="in-box"/>
  <rect x="610" y="590" width="32" height="44" class="box"/>
  <rect x="648" y="590" width="32" height="44" class="box"/>
  <text x="474" y="619" text-anchor="middle" class="value">2</text>
  <text x="512" y="619" text-anchor="middle" class="value">1</text>
  <text x="550" y="619" text-anchor="middle" class="value">5</text>
  <text x="588" y="619" text-anchor="middle" class="value">1</text>
  <text x="626" y="619" text-anchor="middle" class="value">3</text>
  <text x="664" y="619" text-anchor="middle" class="value">2</text>
  <text x="550" y="675" text-anchor="middle" class="small">Window = [1, 5, 1]</text>
  <text x="550" y="700" text-anchor="middle" class="small">Drop leftmost, include new rightmost</text>

  <rect x="710" y="425" width="280" height="315" class="panel-best"/>
  <text x="735" y="460" class="panel-title">Window 2..4</text>
  <text x="735" y="485" class="panel-body">Slide again and update best.</text>
  <text x="735" y="515" class="formula">sum = 7 - 1 + 3 = 9</text>
  <text x="850" y="542" text-anchor="middle" class="best-text">best = 9</text>
  <text x="736" y="575" text-anchor="middle" class="index-text">idx</text>
  <text x="774" y="575" class="index-text">0</text>
  <text x="812" y="575" class="index-text">1</text>
  <text x="850" y="575" class="index-text">2</text>
  <text x="888" y="575" class="index-text">3</text>
  <text x="926" y="575" class="index-text">4</text>
  <text x="964" y="575" class="index-text">5</text>
  <rect x="831" y="558" width="114" height="86" class="window-frame"/>
  <rect x="758" y="590" width="32" height="44" class="box"/>
  <rect x="796" y="590" width="32" height="44" class="out-box"/>
  <rect x="834" y="590" width="32" height="44" class="window-box"/>
  <rect x="872" y="590" width="32" height="44" class="window-box"/>
  <rect x="910" y="590" width="32" height="44" class="in-box"/>
  <rect x="948" y="590" width="32" height="44" class="box"/>
  <text x="774" y="619" text-anchor="middle" class="value">2</text>
  <text x="812" y="619" text-anchor="middle" class="value">1</text>
  <text x="850" y="619" text-anchor="middle" class="value">5</text>
  <text x="888" y="619" text-anchor="middle" class="value">1</text>
  <text x="926" y="619" text-anchor="middle" class="value">3</text>
  <text x="964" y="619" text-anchor="middle" class="value">2</text>
  <text x="850" y="675" text-anchor="middle" class="small">Window = [5, 1, 3]</text>
  <text x="850" y="700" text-anchor="middle" class="small">This is the maximum-sum window</text>

  <rect x="1010" y="425" width="280" height="315" class="panel"/>
  <text x="1035" y="460" class="panel-title">Window 3..5</text>
  <text x="1035" y="485" class="panel-body">One more slide for completeness.</text>
  <text x="1035" y="515" class="formula">sum = 9 - 5 + 2 = 6</text>
  <text x="1150" y="542" text-anchor="middle" class="panel-body">best remains 9</text>
  <text x="1036" y="575" text-anchor="middle" class="index-text">idx</text>
  <text x="1074" y="575" class="index-text">0</text>
  <text x="1112" y="575" class="index-text">1</text>
  <text x="1150" y="575" class="index-text">2</text>
  <text x="1188" y="575" class="index-text">3</text>
  <text x="1226" y="575" class="index-text">4</text>
  <text x="1264" y="575" class="index-text">5</text>
  <rect x="1169" y="558" width="116" height="86" class="window-frame"/>
  <rect x="1058" y="590" width="32" height="44" class="box"/>
  <rect x="1096" y="590" width="32" height="44" class="box"/>
  <rect x="1134" y="590" width="32" height="44" class="out-box"/>
  <rect x="1172" y="590" width="32" height="44" class="window-box"/>
  <rect x="1210" y="590" width="32" height="44" class="window-box"/>
  <rect x="1248" y="590" width="32" height="44" class="in-box"/>
  <text x="1074" y="619" text-anchor="middle" class="value">2</text>
  <text x="1112" y="619" text-anchor="middle" class="value">1</text>
  <text x="1150" y="619" text-anchor="middle" class="value">5</text>
  <text x="1188" y="619" text-anchor="middle" class="value">1</text>
  <text x="1226" y="619" text-anchor="middle" class="value">3</text>
  <text x="1264" y="619" text-anchor="middle" class="value">2</text>
  <text x="1150" y="675" text-anchor="middle" class="small">Window = [1, 3, 2]</text>
  <text x="1150" y="700" text-anchor="middle" class="small">We still update in constant time</text>

  <rect x="90" y="830" width="1220" height="90" class="result-card"/>
  <text x="125" y="870" class="result-title">Each value enters once and leaves once, so the whole scan stays O(n)</text>
  <text x="125" y="898" class="result-body">The key idea is not the window itself, but the constant-time update when the window slides.</text>
</svg>
