<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">Intervals merge walkthrough</title>
  <desc id="desc">An illustration showing how interval merging works by sorting intervals, checking overlap, merging overlaps, and keeping separated intervals apart.</desc>

  <defs>
    <style>
      .card { fill: #f8fbff; stroke: #c8d9eb; stroke-width: 2; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #3d5d7a; }
      .section { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .body { font: 500 17px "Segoe UI", Arial, sans-serif; fill: #2a4460; }
      .mono { font: 700 16px "SFMono-Regular", Consolas, monospace; fill: #17324b; }
      .small { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #3a5a78; }
      .rule { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .accentA { fill: #c8ede3; stroke: #2a8c6e; stroke-width: 2.5; }
      .accentB { fill: #ffe5b8; stroke: #c07d1a; stroke-width: 2.5; }
      .accentC { fill: #d4defc; stroke: #4a6cc9; stroke-width: 2.5; }
      .merged { fill: #c8edcf; stroke: #2d8a4e; stroke-width: 3; }
      .result { fill: #17324b; rx: 18; ry: 18; }
      .result-title { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .result-text { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #d8e6f5; }
      .axis { stroke: #5a7d9e; stroke-width: 2.5; }
      .tick { stroke: #7a9ab8; stroke-width: 2; }
      .flow { stroke: #5a7d9e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5a7d9e"/>
    </marker>
  </defs>

  <rect width="1400" height="1040" fill="#edf5fb"/>
  <rect x="32" y="28" width="1336" height="984" class="card" rx="28" ry="28"/>

  <text x="60" y="84" class="title">Intervals: Sort, Compare, Merge</text>
  <text x="60" y="118" class="subtitle">Most interval problems become easier after sorting by start time and scanning from left to right.</text>

  <rect x="70" y="150" width="1260" height="110" class="card" rx="22" ry="22"/>
  <text x="105" y="192" class="section">Core rule</text>
  <text x="105" y="228" class="rule">If <tspan class="mono">next.start &lt;= current.end</tspan>, the intervals overlap and should be merged.</text>

  <rect x="90" y="300" width="1220" height="580" class="card" rx="28" ry="28"/>
  <text x="125" y="348" class="section">Example: merge intervals</text>
  <text x="125" y="378" class="body">Input: <tspan class="mono">[[1,3], [2,6], [8,10], [15,18]]</tspan></text>

  <!-- ===== Row 1: Sort by start ===== -->

  <text x="125" y="408" class="body">1. Sort by start</text>

  <!-- Bars above axis -->
  <rect x="180" y="420" width="110" height="36" rx="12" ry="12" class="accentA"/>
  <text x="235" y="443" text-anchor="middle" class="mono">[1,3]</text>
  <rect x="235" y="460" width="165" height="36" rx="12" ry="12" class="accentB"/>
  <text x="317" y="483" text-anchor="middle" class="mono">[2,6]</text>
  <rect x="510" y="420" width="110" height="36" rx="12" ry="12" class="accentC"/>
  <text x="565" y="443" text-anchor="middle" class="mono">[8,10]</text>
  <rect x="840" y="420" width="110" height="36" rx="12" ry="12" class="accentC"/>
  <text x="895" y="443" text-anchor="middle" class="mono">[15,18]</text>

  <!-- Axis below bars -->
  <line x1="180" y1="508" x2="1180" y2="508" class="axis"/>
  <line x1="180" y1="496" x2="180" y2="520" class="tick"/>
  <line x1="290" y1="496" x2="290" y2="520" class="tick"/>
  <line x1="400" y1="496" x2="400" y2="520" class="tick"/>
  <line x1="510" y1="496" x2="510" y2="520" class="tick"/>
  <line x1="620" y1="496" x2="620" y2="520" class="tick"/>
  <line x1="840" y1="496" x2="840" y2="520" class="tick"/>
  <line x1="950" y1="496" x2="950" y2="520" class="tick"/>

  <!-- Tick labels below axis -->
  <g class="small">
    <text x="175" y="537">1</text>
    <text x="280" y="537">3</text>
    <text x="390" y="537">6</text>
    <text x="500" y="537">8</text>
    <text x="610" y="537">10</text>
    <text x="835" y="537">15</text>
    <text x="945" y="537">18</text>
  </g>

  <!-- ===== Row 2: Compare current and next ===== -->

  <text x="125" y="570" class="body">2. Compare current and next</text>

  <!-- Bars -->
  <rect x="180" y="582" width="110" height="36" rx="12" ry="12" class="accentA"/>
  <text x="235" y="605" text-anchor="middle" class="mono">[1,3]</text>
  <rect x="235" y="628" width="165" height="36" rx="12" ry="12" class="accentB"/>
  <text x="317" y="651" text-anchor="middle" class="mono">[2,6]</text>

  <!-- Overlap annotation between the two bars -->
  <text x="450" y="622" class="rule">2 &lt;= 3 → overlap</text>
  <path d="M640 618 C700 618, 730 618, 780 618" class="flow"/>
  <text x="800" y="622" class="body">merge into one interval</text>

  <!-- Axis below bars -->
  <line x1="180" y1="676" x2="1180" y2="676" class="axis"/>
  <line x1="180" y1="664" x2="180" y2="688" class="tick"/>
  <line x1="290" y1="664" x2="290" y2="688" class="tick"/>
  <line x1="400" y1="664" x2="400" y2="688" class="tick"/>
  <line x1="510" y1="664" x2="510" y2="688" class="tick"/>
  <line x1="620" y1="664" x2="620" y2="688" class="tick"/>
  <line x1="840" y1="664" x2="840" y2="688" class="tick"/>
  <line x1="950" y1="664" x2="950" y2="688" class="tick"/>

  <!-- ===== Row 3: Keep separated intervals ===== -->

  <text x="125" y="718" class="body">3. Keep separated intervals as they are</text>

  <!-- Bars -->
  <rect x="180" y="730" width="220" height="36" rx="12" ry="12" class="merged"/>
  <text x="290" y="753" text-anchor="middle" class="mono">[1,6]</text>
  <rect x="510" y="730" width="110" height="36" rx="12" ry="12" class="accentC"/>
  <text x="565" y="753" text-anchor="middle" class="mono">[8,10]</text>
  <rect x="840" y="730" width="110" height="36" rx="12" ry="12" class="accentC"/>
  <text x="895" y="753" text-anchor="middle" class="mono">[15,18]</text>

  <!-- Axis below bars -->
  <line x1="180" y1="778" x2="1180" y2="778" class="axis"/>
  <line x1="180" y1="766" x2="180" y2="790" class="tick"/>
  <line x1="290" y1="766" x2="290" y2="790" class="tick"/>
  <line x1="400" y1="766" x2="400" y2="790" class="tick"/>
  <line x1="510" y1="766" x2="510" y2="790" class="tick"/>
  <line x1="620" y1="766" x2="620" y2="790" class="tick"/>
  <line x1="840" y1="766" x2="840" y2="790" class="tick"/>
  <line x1="950" y1="766" x2="950" y2="790" class="tick"/>

  <!-- No overlap annotation below axis -->
  <text x="450" y="820" class="rule">8 &gt; 6 and 15 &gt; 10 → no overlap</text>

  <!-- ===== Result ===== -->

  <rect x="90" y="910" width="1220" height="70" class="result"/>
  <text x="125" y="952" class="result-title">Result: <tspan class="mono" fill="#ffffff">[[1,6], [8,10], [15,18]]</tspan></text>
  <text x="650" y="952" class="result-text">Scan once after sorting, merge when intervals touch or overlap.</text>
</svg>
