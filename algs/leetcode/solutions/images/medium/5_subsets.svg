<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Subsets recursion tree illustration</title>
  <desc id="desc">A decision tree for generating all subsets of [1, 2, 3] by skipping or taking each element.</desc>

  <defs>
    <style>
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #47607d; }
      .label { font: 600 15px "Segoe UI", Arial, sans-serif; }
      .box-text { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #16324f; }
      .small { font: 500 16px "Segoe UI", Arial, sans-serif; fill: #35516f; }
      .legend { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #27435f; }
      .card { fill: #f8fbff; stroke: #c7d8ea; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #9fb7d3; stroke-width: 2; rx: 18; ry: 18; }
      .leaf { fill: #f3fbf8; stroke: #4c9f7a; stroke-width: 2.5; rx: 18; ry: 18; }
      .callout { fill: #fff8e8; stroke: #efc56d; stroke-width: 2; rx: 20; ry: 20; }
      .skip-line { stroke: #d9922b; stroke-width: 3; stroke-dasharray: 10 8; fill: none; }
      .take-line { stroke: #2f8f71; stroke-width: 3.5; fill: none; }
      .result-card { fill: #16324f; rx: 18; ry: 18; }
      .result-text { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .result-small { font: 500 16px "Segoe UI", Arial, sans-serif; fill: #d9e8f8; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#eef5fb"/>
  <rect x="32" y="28" width="1336" height="924" class="card" rx="28" ry="28"/>

  <text x="60" y="84" class="title">Subsets Backtracking Tree</text>
  <text x="60" y="118" class="subtitle">Input: nums = [1, 2, 3]. At each index we branch into two choices: skip the number or take it.</text>

  <line x1="60" y1="152" x2="220" y2="152" class="skip-line"/>
  <text x="235" y="158" class="legend">skip current number</text>
  <line x1="460" y1="152" x2="620" y2="152" class="take-line"/>
  <text x="635" y="158" class="legend">take current number</text>

  <rect x="1120" y="70" width="210" height="170" class="callout"/>
  <text x="1145" y="108" class="box-text">Backtracking rule</text>
  <text x="1145" y="140" class="small">1. Stop at index == n</text>
  <text x="1145" y="168" class="small">2. Save current subset</text>
  <text x="1145" y="196" class="small">3. Explore skip branch</text>
  <text x="1145" y="224" class="small">4. Explore take branch</text>

  <rect x="645" y="190" width="110" height="48" class="node"/>
  <text x="700" y="221" text-anchor="middle" class="box-text">[]</text>

  <rect x="405" y="310" width="110" height="48" class="node"/>
  <text x="460" y="341" text-anchor="middle" class="box-text">[]</text>
  <rect x="885" y="310" width="110" height="48" class="node"/>
  <text x="940" y="341" text-anchor="middle" class="box-text">[1]</text>

  <rect x="225" y="430" width="110" height="48" class="node"/>
  <text x="280" y="461" text-anchor="middle" class="box-text">[]</text>
  <rect x="465" y="430" width="110" height="48" class="node"/>
  <text x="520" y="461" text-anchor="middle" class="box-text">[2]</text>
  <rect x="765" y="430" width="110" height="48" class="node"/>
  <text x="820" y="461" text-anchor="middle" class="box-text">[1]</text>
  <rect x="1005" y="430" width="110" height="48" class="node"/>
  <text x="1060" y="461" text-anchor="middle" class="box-text">[1,2]</text>

  <rect x="85" y="610" width="110" height="48" class="leaf"/>
  <text x="140" y="641" text-anchor="middle" class="box-text">[]</text>
  <rect x="245" y="610" width="110" height="48" class="leaf"/>
  <text x="300" y="641" text-anchor="middle" class="box-text">[3]</text>
  <rect x="405" y="610" width="110" height="48" class="leaf"/>
  <text x="460" y="641" text-anchor="middle" class="box-text">[2]</text>
  <rect x="565" y="610" width="110" height="48" class="leaf"/>
  <text x="620" y="641" text-anchor="middle" class="box-text">[2,3]</text>
  <rect x="725" y="610" width="110" height="48" class="leaf"/>
  <text x="780" y="641" text-anchor="middle" class="box-text">[1]</text>
  <rect x="885" y="610" width="110" height="48" class="leaf"/>
  <text x="940" y="641" text-anchor="middle" class="box-text">[1,3]</text>
  <rect x="1045" y="610" width="110" height="48" class="leaf"/>
  <text x="1100" y="641" text-anchor="middle" class="box-text">[1,2]</text>
  <rect x="1205" y="610" width="110" height="48" class="leaf"/>
  <text x="1260" y="641" text-anchor="middle" class="box-text">[1,2,3]</text>

  <path d="M700 238 L460 310" class="skip-line"/>
  <path d="M700 238 L940 310" class="take-line"/>

  <path d="M460 358 L280 430" class="skip-line"/>
  <path d="M460 358 L520 430" class="take-line"/>
  <path d="M940 358 L820 430" class="skip-line"/>
  <path d="M940 358 L1060 430" class="take-line"/>

  <path d="M280 478 L140 610" class="skip-line"/>
  <path d="M280 478 L300 610" class="take-line"/>
  <path d="M520 478 L460 610" class="skip-line"/>
  <path d="M520 478 L620 610" class="take-line"/>
  <path d="M820 478 L780 610" class="skip-line"/>
  <path d="M820 478 L940 610" class="take-line"/>
  <path d="M1060 478 L1100 610" class="skip-line"/>
  <path d="M1060 478 L1260 610" class="take-line"/>

  <text x="565" y="264" class="label" fill="#c57b14">skip 1</text>
  <text x="810" y="264" class="label" fill="#246f58">take 1</text>
  <text x="320" y="394" class="label" fill="#c57b14">skip 2</text>
  <text x="475" y="394" class="label" fill="#246f58">take 2</text>
  <text x="805" y="394" class="label" fill="#c57b14">skip 2</text>
  <text x="980" y="394" class="label" fill="#246f58">take 2</text>
  <text x="170" y="560" class="label" fill="#c57b14">skip 3</text>
  <text x="265" y="560" class="label" fill="#246f58">take 3</text>
  <text x="460" y="560" class="label" fill="#c57b14">skip 3</text>
  <text x="555" y="560" class="label" fill="#246f58">take 3</text>
  <text x="780" y="560" class="label" fill="#c57b14">skip 3</text>
  <text x="875" y="560" class="label" fill="#246f58">take 3</text>
  <text x="1095" y="560" class="label" fill="#c57b14">skip 3</text>
  <text x="1190" y="560" class="label" fill="#246f58">take 3</text>

  <rect x="100" y="740" width="1200" height="150" class="result-card"/>
  <text x="140" y="785" class="result-text">Every root-to-leaf path produces one subset</text>
  <text x="140" y="820" class="result-small">For n numbers there are 2^n subsets, because each element has exactly two choices: skip or take.</text>
  <text x="140" y="855" class="result-small">This is why subset generation takes O(n x 2^n) time and stores O(n x 2^n) output in the worst case.</text>
</svg>
