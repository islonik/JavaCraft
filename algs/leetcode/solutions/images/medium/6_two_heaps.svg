<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">Two heaps pattern illustration</title>
  <desc id="desc">Diagram showing a max heap for the lower half, a min heap for the upper half, rebalancing rules, and median lookup.</desc>

  <defs>
    <style>
      .bg-card { fill: #f8fbff; stroke: #c8d9eb; stroke-width: 2; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #4a647f; }
      .card-title { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .body { font: 500 17px "Segoe UI", Arial, sans-serif; fill: #35516d; }
      .label { font: 600 16px "Segoe UI", Arial, sans-serif; }
      .small { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #4a647f; }
      .heap-left { fill: #fff0ea; stroke: #e89971; stroke-width: 2.5; }
      .heap-right { fill: #eef8f6; stroke: #64b39a; stroke-width: 2.5; }
      .heap-text { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #17324b; }
      .chip { rx: 16; ry: 16; }
      .pipe { fill: #ffffff; stroke: #d4e1ef; stroke-width: 2; rx: 18; ry: 18; }
      .result-card { fill: #17324b; rx: 20; ry: 20; }
      .result-title { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .result-body { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #d8e6f5; }
      .left-line { stroke: #d27b45; stroke-width: 3.5; fill: none; }
      .right-line { stroke: #329377; stroke-width: 3.5; fill: none; }
      .rebalance { stroke: #7b64c7; stroke-width: 3; fill: none; marker-end: url(#arrowPurple); stroke-dasharray: 10 8; }
    </style>

    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7b64c7"/>
    </marker>
  </defs>

  <rect width="1400" height="1120" fill="#edf5fb"/>
  <rect x="32" y="28" width="1336" height="1064" class="bg-card" rx="28" ry="28"/>

  <!-- ===== Header ===== -->
  <text x="60" y="84" class="title">Two Heaps to find median</text>
  <text x="60" y="118" class="subtitle">Split the stream into two halves: the lower half goes to a max heap, the upper half goes to a min heap.</text>

  <!-- ===== Flow card (own row, no overlap with info boxes) ===== -->
  <rect x="70" y="155" width="1260" height="70" class="pipe"/>
  <text x="105" y="188" class="card-title">Flow</text>
  <text x="105" y="211" class="body">Insert number → compare with maxHeap top → place into one heap → rebalance sizes → read median from heap roots</text>

  <!-- ===== Info boxes (separate row below Flow) ===== -->
  <rect x="75" y="248" width="285" height="88" class="pipe"/>
  <text x="105" y="283" class="label" fill="#17324b">Example stream</text>
  <text x="105" y="311" class="small">add 5, 2, 10, 4, 12, 8</text>

  <rect x="830" y="248" width="230" height="88" class="heap-right chip"/>
  <text x="860" y="272" class="label" fill="#236f59" dominant-baseline="middle">Invariant 2</text>
  <text x="860" y="292" class="small" dominant-baseline="middle">heap sizes differ</text>
  <text x="860" y="312" class="small" dominant-baseline="middle">by at most one</text>

  <rect x="1085" y="248" width="240" height="88" class="heap-left chip"/>
  <text x="1115" y="272" class="label" fill="#9a5528" dominant-baseline="middle">Invariant 1</text>
  <text x="1115" y="292" class="small" dominant-baseline="middle">all left values ≤</text>
  <text x="1115" y="312" class="small" dominant-baseline="middle">all right values</text>

  <!-- ===== Top rebalance arrow + label ===== -->
  <!-- Arrow first, then bg rect masks it, then text on top -->
  <path d="M825 415 C750 375, 650 375, 575 415" class="rebalance"/>
  <rect x="530" y="355" width="340" height="24" rx="6" ry="6" fill="#edf5fb"/>
  <text x="700" y="373" text-anchor="middle" class="label" fill="#6e59b6">if right side is too large → move to left side</text>

  <!-- ===== Left heap card ===== -->
  <rect x="75" y="390" width="495" height="460" class="bg-card" rx="24" ry="24"/>
  <text x="105" y="435" class="card-title">Lower half: Max Heap</text>
  <text x="105" y="465" class="body">Keeps the smaller numbers.</text>
  <text x="105" y="490" class="body">The root is the largest value in the lower half.</text>

  <!-- Left heap tree -->
  <circle cx="310" cy="560" r="38" class="heap-left"/>
  <text x="310" y="568" text-anchor="middle" class="heap-text">5</text>
  <circle cx="200" cy="670" r="34" class="heap-left"/>
  <text x="200" y="678" text-anchor="middle" class="heap-text">4</text>
  <circle cx="420" cy="670" r="34" class="heap-left"/>
  <text x="420" y="678" text-anchor="middle" class="heap-text">2</text>

  <path d="M310 598 L200 636" class="left-line"/>
  <path d="M310 598 L420 636" class="left-line"/>

  <!-- Left summary chip -->
  <rect x="120" y="745" width="400" height="62" class="heap-left chip"/>
  <text x="155" y="784" class="label" fill="#9a5528">maxHeap stores: [5, 4, 2]</text>

  <!-- ===== Right heap card ===== -->
  <rect x="830" y="390" width="495" height="460" class="bg-card" rx="24" ry="24"/>
  <text x="860" y="435" class="card-title">Upper half: Min Heap</text>
  <text x="860" y="465" class="body">Keeps the larger numbers.</text>
  <text x="860" y="490" class="body">The root is the smallest value in the upper half.</text>

  <!-- Right heap tree -->
  <circle cx="1090" cy="560" r="38" class="heap-right"/>
  <text x="1090" y="568" text-anchor="middle" class="heap-text">8</text>
  <circle cx="980" cy="670" r="34" class="heap-right"/>
  <text x="980" y="678" text-anchor="middle" class="heap-text">10</text>
  <circle cx="1200" cy="670" r="34" class="heap-right"/>
  <text x="1200" y="678" text-anchor="middle" class="heap-text">12</text>

  <path d="M1090 598 L980 636" class="right-line"/>
  <path d="M1090 598 L1200 636" class="right-line"/>

  <!-- Right summary chip -->
  <rect x="880" y="745" width="400" height="62" class="heap-right chip"/>
  <text x="915" y="784" class="label" fill="#236f59">minHeap stores: [8, 10, 12]</text>

  <!-- ===== Rebalance box (centered in 260px gap) ===== -->
  <rect x="590" y="490" width="220" height="190" class="pipe"/>
  <text x="700" y="528" text-anchor="middle" class="card-title" font-size="22">Rebalance</text>
  <text x="615" y="566" class="small">size diff ≤ 1</text>
  <text x="615" y="594" class="small">move root across</text>
  <text x="615" y="622" class="small">when one heap</text>
  <text x="615" y="650" class="small">gets too big</text>

  <!-- ===== Bottom rebalance arrow + label ===== -->
  <!-- Arrow first, then bg rect masks it, then text on top -->
  <path d="M575 815 C650 860, 750 860, 825 815" class="rebalance"/>
  <rect x="530" y="860" width="340" height="24" rx="6" ry="6" fill="#edf5fb"/>
  <text x="700" y="878" text-anchor="middle" class="label" fill="#6e59b6">if left side is too large → move to right side</text>

  <!-- ===== Result card ===== -->
  <rect x="90" y="910" width="1220" height="115" class="result-card"/>
  <text x="125" y="955" class="result-title">Median lookup</text>
  <text x="125" y="990" class="result-body">Equal sizes → median = (maxHeap.peek() + minHeap.peek()) / 2 = (5 + 8) / 2 = 6.5</text>
</svg>
