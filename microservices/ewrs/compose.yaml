services:
  postgres:
    image: postgres:17
    container_name: ewrs-postgres
    environment:
      POSTGRES_DB: ewrs
      POSTGRES_USER: ewrs
      POSTGRES_PASSWORD: ewrs
    ports:
      - "5434:5432"
    volumes:
      - ewrs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewrs -d ewrs"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ewrs_postgres_data:
